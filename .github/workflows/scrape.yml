name: Daily Scrape

on:
  schedule:
    - cron: '0 7 * * *'   # cada día a las 7:00 UTC (9:00 España)
  workflow_dispatch:        # también puedes lanzarlo a mano desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: Commit y push del JSON actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games_data.json
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +'%Y-%m-%d')"
          git push
